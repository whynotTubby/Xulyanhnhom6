<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <title>PixelLab</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="app-container">
        <aside class="sidebar">
            <h2>PixelLab <span>Pro</span></h2>

            <div class="control-group">
                <label class="upload-btn">
                    Tải ảnh lên
                    <input type="file" id="upload" accept="image/*" hidden>
                </label>
                <p id="file-name" style="font-size: 12px; color: #94a3b8; margin-top: 5px;">Chưa chọn ảnh</p>
            </div>

            <div class="control-group">
                <label>Điều chỉnh màu sắc</label>
                <div class="slider-row">
                    <span>Sáng</span>
                    <input type="range" id="brightness" min="-100" max="100" value="0">
                    <b id="val-b">0</b>
                </div>
                <div class="slider-row">
                    <span>T.Phản</span>
                    <input type="range" id="contrast" min="-100" max="100" value="0">
                    <b id="val-c">0</b>
                </div>
                <div class="slider-row">
                    <span>Bão hòa</span>
                    <input type="range" id="saturation" min="-100" max="100" value="0">
                    <b id="val-s">0</b>
                </div>
            </div>

            <div class="control-group">
                <label>Xoay & Lật</label>
                <div class="btn-grid">
                    <button onclick="applyAction('rotate')">Xoay 90°</button>
                    <button onclick="applyAction('flip_h')">Lật Ngang</button>
                    <button onclick="applyAction('flip_v')">Lật Dọc</button>
                </div>
            </div>

            <div class="control-group">
                <label>Bộ lọc màu</label>
                <select id="filter-select" onchange="if(this.value) applyAction('filter', {filter_type: this.value})">
                    <option value="">-- Chọn hiệu ứng --</option>
                    <option value="sepia">Hoài cổ</option>
                    <option value="grayscale">Đen trắng</option>
                    <option value="negative">Âm bản</option>
                    <option value="sharpen">Sắc nét</option>
                    <option value="blur">Làm mờ</option>
                </select>
            </div>

            <div class="control-group footer-btns">
                <button onclick="undo()" class="btn-secondary">Undo ↩️</button>
                <button onclick="downloadImage()">Tải về ⬇️</button>
            </div>
        </aside>

        <main class="preview-panel">
            <div class="canvas-wrapper">
                <img id="main-preview" src="" style="display:none;">
                <div id="loading-overlay" style="display:none;">Đang xử lý...</div>
            </div>
            <button id="compare-btn" class="compare-btn">GIỮ CHUỘT ĐỂ XEM ẢNH GỐC</button>
        </main>
    </div>
    <script src="script.js"></script>
</body>

</html>
